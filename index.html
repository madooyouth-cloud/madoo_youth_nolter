<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 놀터 출석부</title>
    
    <style>
        /* 시스템 기본 둥근 고딕/손글씨 계열 폰트로 완벽 백업 (외부 인터넷 폰트 의존도 제거) */
        @font-face {
            font-family: 'LocalJua';
            src: local('Jua'), local('Comic Sans MS'), local('Apple SD Gothic Neo'), local('Malgun Gothic'), sans-serif;
        }

        :root {
            --bg-color: #ffd2e0; 
            --notebook-yellow: #fff3cb; 
            --kitsch-pink: #ff5e97;
            --kitsch-blue: #3bc9db;
            --kitsch-yellow: #ffd43b;
            --kitsch-purple: #b197fc;
            --kitsch-green: #51cf66;
            --kitsch-orange: #ff922b;
            --border-dark: #121212;
        }

        * {
            box-sizing: border-box;
            font-family: 'LocalJua', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#ff8dab 20%, transparent 20%), radial-gradient(#ff8dab 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            margin: 0; padding: 10px; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow-x: hidden; position: relative;
        }

        .notebook-container {
            width: 100%; max-width: 1100px; height: 85vh; min-height: 580px; max-height: 740px;
            background-color: var(--notebook-yellow); border: clamp(4px, 0.6vw, 6px) solid var(--border-dark);
            border-radius: 30px; box-shadow: 10px 10px 0px var(--border-dark);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            animation: notebook-enter 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .progress-ribbon {
            background-color: var(--border-dark); padding: 12px 5%;
            display: flex; justify-content: space-between; align-items: center; color: white;
            border-bottom: clamp(4px, 0.6vw, 6px) solid var(--border-dark); font-size: clamp(18px, 2vw, 24px);
        }

        .progress-dots { display: flex; gap: 8px; }
        .dot {
            width: clamp(14px, 1.5vw, 20px); height: clamp(14px, 1.5vw, 20px);
            border: 2px solid white; border-radius: 50%; background-color: transparent; transition: all 0.3s ease;
        }
        .dot.active { background-color: var(--kitsch-pink); transform: scale(1.2); border-color: var(--kitsch-pink); }
        .dot.completed { background-color: var(--kitsch-green); border-color: var(--kitsch-green); }

        .step-viewport { flex-grow: 1; position: relative; width: 100%; height: calc(100% - 130px); }
        .step-page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: clamp(15px, 2.5vw, 35px) clamp(20px, 4vw, 50px);
            display: flex; flex-direction: column; justify-content: space-between; display: none;
        }
        .step-page.active { display: flex; }

        .kitsch-title { font-size: clamp(24px, 4vw, 42px); line-height: 1.2; color: var(--border-dark); margin: 0 0 6px 0; text-shadow: 2px 2px 0px white; }
        .kitsch-subtitle { font-size: clamp(14px, 1.8vw, 20px); color: #555; margin-bottom: 12px; }

        .welcome-hero { display: flex; flex-direction: row; align-items: center; justify-content: space-between; height: 100%; gap: 20px; }
        .welcome-left { flex: 1.2; width: 100%; }
        .welcome-right { flex: 0.8; display: flex; justify-content: center; align-items: center; }

        .doit-mascot-wrapper {
            position: relative; width: clamp(160px, 26vw, 300px); height: clamp(160px, 26vw, 300px);
            display: flex; justify-content: center; align-items: center;
            animation: bounce 1.8s infinite alternate cubic-bezier(0.445, 0.05, 0.55, 0.95);
        }
        .doit-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(4px 4px 0px var(--border-dark)); }

        .badge-10th {
            background-color: var(--kitsch-pink); color: white; padding: 4px 12px;
            font-size: clamp(14px, 1.6vw, 22px); border-radius: 40px; border: 3px solid var(--border-dark);
            display: inline-block; transform: rotate(-5deg); margin-bottom: 10px; box-shadow: 3px 3px 0 var(--border-dark);
        }

        .kitsch-input {
            width: 100%; max-width: 500px; padding: clamp(12px, 2vw, 18px) clamp(15px, 2.5vw, 22px);
            font-size: clamp(18px, 2.8vw, 28px); border: 4px solid var(--border-dark); border-radius: 20px;
            background-color: white; box-shadow: 5px 5px 0px var(--border-dark); outline: none;
        }

        .grid-wrapper {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px; overflow-y: auto; flex-grow: 1; padding: 5px; margin-bottom: 5px;
        }

        .kitsch-card {
            background-color: white; border: 4px solid var(--border-dark); border-radius: 20px;
            padding: 12px 10px; box-shadow: 4px 4px 0px var(--border-dark);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .kitsch-card:nth-child(1) { background-color: #fff4f2; }
        .kitsch-card:nth-child(2) { background-color: #f3f0ff; }
        .kitsch-card:nth-child(3) { background-color: #e3faf2; }
        .kitsch-card:nth-child(4) { background-color: #fff9db; }
        .kitsch-card:nth-child(5) { background-color: #ebfbee; }
        .kitsch-card:nth-child(6) { background-color: #e8f7ff; }
        .kitsch-card:nth-child(7) { background-color: #fff0f6; }

        .card-title { font-size: clamp(18px, 2vw, 22px); font-weight: bold; border-bottom: 3px solid var(--border-dark); padding-bottom: 2px; width: 100%; text-align: center; }

        .counter-row {
            width: 100%; display: flex; align-items: center; justify-content: space-between;
            background: white; border: 2px solid var(--border-dark); border-radius: 12px; padding: 4px 8px;
        }
        .counter-controls { display: flex; align-items: center; gap: 8px; }
        .counter-btn {
            width: 26px; height: 26px; border-radius: 6px; border: 2px solid var(--border-dark);
            display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 15px; font-weight: bold;
        }
        .counter-btn.minus { background-color: #ff8787; }
        .counter-btn.plus { background-color: #8ce99a; }
        .count-val { font-size: 16px; font-weight: bold; width: 18px; text-align: center; }

        .card-region-selector-zone {
            width: 100%; display: flex; flex-direction: column; gap: 4px; margin-top: 4px; border-top: 1px dashed #ccc; padding-top: 6px;
        }
        .region-select-row {
            display: flex; align-items: center; justify-content: space-between; width: 100%; font-size: 14px; background: rgba(255,255,255,0.7); padding: 3px 6px; border-radius: 8px; border: 1px solid #ddd;
        }
        .region-select-row select {
            font-size: 13px; font-family: 'LocalJua', sans-serif; padding: 2px 4px; border: 2px solid var(--border-dark); border-radius: 6px; outline: none; background: white;
        }
        .region-select-row select.need-select {
            border: 2px solid #ff6b6b !important; background-color: #fff5f5 !important; color: #ff6b6b !important;
        }

        .status-sticker {
            position: absolute; right: 3%; top: 15px; border: 4px solid var(--border-dark); border-radius: 50%;
            width: clamp(80px, 10vw, 105px); height: clamp(80px, 10vw, 105px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 4px 4px 0 var(--border-dark); z-index: 10; background-color: var(--kitsch-yellow); transform: rotate(-10deg);
        }
        .status-sticker span { font-size: clamp(10px, 1.1vw, 12px); color: #333; font-weight: bold; }
        .status-sticker strong { font-size: clamp(20px, 2.8vw, 28px); }

        .receipt-container { display: flex; flex-direction: row; justify-content: space-between; align-items: center; height: 100%; gap: clamp(15px, 3vw, 40px); overflow-y: auto; }
        .receipt-paper { background: white; border: 4px solid var(--border-dark); box-shadow: 6px 6px 0 var(--border-dark); border-radius: 15px; padding: 20px; flex: 1.2; width: 100%; max-height: 100%; overflow-y: auto; }
        .receipt-row { display: flex; justify-content: space-between; font-size: clamp(16px, 2.2vw, 22px); margin-bottom: 6px; border-bottom: 2px dashed #ccc; padding-bottom: 4px; }
        .receipt-row em { color: var(--kitsch-pink); font-style: normal; font-weight: bold; }
        .receipt-sub-list { font-size: clamp(13px, 1.6vw, 16px); color: #555; padding-left: 10px; margin-bottom: 6px; line-height: 1.4; max-height: 180px; overflow-y: auto; }
        .receipt-summary-right { flex: 0.8; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .footer-action-bar { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-top: 6px solid var(--border-dark); background-color: white; }
        .nav-btn { padding: clamp(10px, 1.4vw, 14px) clamp(18px, 2.8vw, 32px); font-size: clamp(16px, 2vw, 22px); border: 4px solid var(--border-dark); border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 4px 4px 0 var(--border-dark); }
        .nav-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--border-dark); }
        .btn-back { background-color: #e0e0e0; }
        .btn-next { background-color: var(--kitsch-orange); color: white; }
        .btn-submit { background-color: var(--kitsch-green); color: white; }

        .admin-zone { width: 95%; max-width: 1100px; margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); padding: 10px 15px; border-radius: 15px; border: 2px solid white; z-index: 20; }
        .admin-zone span { color: #fff; font-size: 13px; font-weight: bold; }
        .admin-btn { padding: 6px 12px; font-size: 13px; border: 2px solid var(--border-dark); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-excel { background-color: var(--kitsch-yellow); }
        .btn-copy-mode { background-color: var(--kitsch-blue); color: white; }
        .btn-clear { background-color: #ff6b6b; color: white; }

        .admin-textarea-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 550px; background-color: white; border: 5px solid var(--border-dark); border-radius: 20px; box-shadow: 0px 0px 30px rgba(0,0,0,0.3); padding: 20px; z-index: 200; }
        .admin-textarea-modal h3 { font-size: 22px; margin-top: 0; }
        .kitsch-textarea { width: 100%; height: 180px; border: 3px solid var(--border-dark); border-radius: 10px; padding: 10px; font-size: 13px; resize: none; -webkit-user-select: text; user-select: text; }

        @media (max-width: 680px) {
            body { padding: 5px; }
            .notebook-container { height: 92vh; border-radius: 20px; }
            .welcome-hero { flex-direction: column-reverse; justify-content: center; gap: 10px; }
            .grid-wrapper { grid-template-columns: 1fr; max-height: 310px; }
            .status-sticker { top: 5px; right: 5px; }
            .receipt-container { flex-direction: column; }
            .receipt-summary-right { display: none; }
            .admin-zone { font-size: 11px; padding: 6px; }
            .admin-btn { padding: 4px 8px; font-size: 11px; }
        }

        @keyframes notebook-enter { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 0% { transform: translateY(5px); } 100% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="notebook-container">
        <div class="progress-ribbon">
            <span>2026 놀터 출석부 📝</span>
            <div class="progress-dots">
                <div class="dot active" id="dot1"></div>
                <div class="dot" id="dot2"></div>
                <div class="dot" id="dot3"></div>
            </div>
        </div>

        <div class="step-viewport">
            <!-- STEP 1 -->
            <div class="step-page active" id="step1">
                <div class="welcome-hero">
                    <div class="welcome-left">
                        <div class="badge-10th">WELCOME !</div>
                        <h1 class="kitsch-title">출석 체크를 시작할게!<br>너의 이름은 뭐야?</h1>
                        <p class="kitsch-subtitle">출석부를 이끌고 갈 대표 친구의 이름을 적어줘 📝</p>
                        <input type="text" id="leaderName" class="kitsch-input" placeholder="여기에 이름 입력하기..." autocomplete="off">
                    </div>
                    <div class="welcome-right">
                        <div class="doit-mascot-wrapper">
                            <img src="해냈다 두잇.png" alt="두잇 캐릭터" class="doit-img">
                        </div>
                    </div>
                </div>
            </div>

            <!-- STEP 2 -->
            <div class="step-page" id="step2">
                <div>
                    <h1 class="kitsch-title">누구누구 같이 왔어?</h1>
                    <p class="kitsch-subtitle">같이 온 인원수를 올리고, 그 아래에서 각각의 지역구를 꼭 선택해줘! 👥</p>
                </div>
                <div class="status-sticker yellow">
                    <span>총 인원</span>
                    <strong id="totalCountDisplay">0</strong>
                </div>
                <div class="grid-wrapper" id="ageGrid"></div>
            </div>

            <!-- STEP 3 -->
            <div class="step-page" id="step3">
                <div class="receipt-container">
                    <div class="receipt-paper">
                        <h1 class="kitsch-title" style="font-size: clamp(22px, 3vw, 32px); text-align:center; margin-bottom:12px;">체크인 영수증 🧾</h1>
                        <div class="receipt-row"><span>대표자</span><em id="finalLeader">---</em></div>
                        
                        <div class="receipt-row" style="margin-bottom:2px; border:none; color:var(--kitsch-pink);"><span>정밀 연령 및 지역 매칭 명단</span></div>
                        <div class="receipt-sub-list" id="finalDetailsList" style="background:#fbfcfd; padding:10px; border:1px dashed #aaa; border-radius:10px;"></div>

                        <div class="receipt-row" style="border-top:3px solid #121212; padding-top:10px; margin-top:10px;"><span>총 멤버 수</span><em id="finalTotal">0 명</em></div>
                    </div>
                    <div class="receipt-summary-right">
                        <div class="doit-mascot-wrapper">
                            <img src="해냈다 두잇.png" alt="두잇 캐릭터" class="doit-img">
                        </div>
                        <h2 style="font-size: clamp(18px, 2.5vw, 28px); margin-top:15px;">출석 준비 끝! 완벽해!</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-action-bar">
            <button class="nav-btn btn-back" id="prevBtn" onclick="moveStep(-1)" style="visibility: hidden;">
                이전으로
            </button>
            <button class="nav-btn btn-next" id="nextBtn" onclick="moveStep(1)">
                다음 단계로
            </button>
        </div>
    </div>

    <!-- 관리자 독바 -->
    <div class="admin-zone">
        <span>⚙️ 놀터 관리자 메뉴 :</span>
        <button class="admin-btn btn-copy-mode" onclick="checkAdminPassword('copy')">📋 전체 데이터 텍스트 복사</button>
        <button class="admin-btn btn-excel" onclick="checkAdminPassword('download')">📊 일반 파일 다운로드</button>
        <button class="admin-btn btn-clear" onclick="checkAdminPassword('clear')">⚠️ 전체 데이터 초기화</button>
    </div>

    <!-- 복사용 모달 -->
    <div class="admin-textarea-modal" id="textDataModal">
        <h3>📋 누적 데이터 복사하기</h3>
        <p>아래 상자 안의 텍스트를 복사해 카톡이나 컴퓨터 메모장에 붙여넣으세요!</p>
        <textarea class="kitsch-textarea" id="modalTextarea" readonly></textarea>
        <div class="modal-btns">
            <button class="admin-btn btn-copy-mode" onclick="copyModalText()">텍스트 전체 복사하기</button>
            <button class="admin-btn btn-back" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "0924";

        let currentStep = 1;
        let totalCheckedPeople = 0;
        
        const ageCategories = ["유아", "초등", "중등", "고등", "대학생", "학교밖", "성인"];
        const regionOptions = ["일산동구", "덕양구", "일산서구", "기타"];

        const attendanceData = {};
        ageCategories.forEach(cat => {
            attendanceData[cat] = { male: [], female: [] };
        });

        const ageGrid = document.getElementById('ageGrid');
        ageCategories.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'kitsch-card';
            card.id = `card-${cat}`;
            card.innerHTML = `
                <div class="card-title">${cat}</div>
                <div class="counter-row">
                    <span>남 👦🏻</span>
                    <div class="counter-controls">
                        <div class="counter-btn minus" onclick="changePersonCount('${cat}', 'male', -1)">-</div>
                        <div class="count-val" id="${cat}-male-val">0</div>
                        <div class="counter-btn plus" onclick="changePersonCount('${cat}', 'male', 1)">+</div>
                    </div>
                </div>
                <div class="counter-row">
                    <span>여 👧🏻</span>
                    <div class="counter-controls">
                        <div class="counter-btn minus" onclick="changePersonCount('${cat}', 'female', -1)">-</div>
                        <div class="count-val" id="${cat}-female-val">0</div>
                        <div class="counter-btn plus" onclick="changePersonCount('${cat}', 'female', 1)">+</div>
                    </div>
                </div>
                <div class="card-region-selector-zone" id="${cat}-selectors-zone"></div>
            `;
            ageGrid.appendChild(card);
        });

        function changePersonCount(category, gender, change) {
            let list = attendanceData[category][gender];
            if (change === 1) {
                list.push({ region: "" }); 
            } else if (change === -1) {
                if (list.length > 0) list.pop();
            }
            
            document.getElementById(`${category}-${gender}-val`).textContent = list.length;
            rebuildRegionSelectors(category);
            calculateTotals();
        }

        function rebuildRegionSelectors(category) {
            const zone = document.getElementById(`${category}-selectors-zone`);
            zone.innerHTML = ""; 

            attendanceData[category].male.forEach((person, idx) => {
                const row = createSelectRow(category, 'male', idx, person.region);
                zone.appendChild(row);
            });

            attendanceData[category].female.forEach((person, idx) => {
                const row = createSelectRow(category, 'female', idx, person.region);
                zone.appendChild(row);
            });
        }

        function createSelectRow(category, gender, idx, currentRegion) {
            const row = document.createElement('div');
            row.className = 'region-select-row';
            
            const genderTag = gender === 'male' ? '남 👦🏻' : '여 👧🏻';
            row.innerHTML = `<span>${genderTag}${idx + 1}번의 지역:</span>`;
            
            const select = document.createElement('select');
            select.id = `select-${category}-${gender}-${idx}`;
            
            const defaultOpt = document.createElement('option');
            defaultOpt.value = "";
            defaultOpt.textContent = "─ 선택해줘! 📍 ─";
            defaultOpt.disabled = true;
            
            if (currentRegion === "") {
                defaultOpt.selected = true;
                select.classList.add('need-select');
            }
            select.appendChild(defaultOpt);

            regionOptions.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                if(opt === currentRegion) option.selected = true;
                select.appendChild(option);
            });

            select.onchange = function() {
                attendanceData[category][gender][idx].region = select.value;
                if(select.value !== "") {
                    select.classList.remove('need-select');
                }
            };
            
            row.appendChild(select);
            return row;
        }

        function calculateTotals() {
            let total = 0;
            ageCategories.forEach(cat => {
                total += attendanceData[cat].male.length;
                total += attendanceData[cat].female.length;
            });
            document.getElementById('totalCountDisplay').textContent = total;
            totalCheckedPeople = total;
            return total;
        }

        function checkAllRegionsSelected() {
            let allValid = true;
            let errorMsg = "";

            for (let i = 0; i < ageCategories.length; i++) {
                let cat = ageCategories[i];
                
                for (let m = 0; m < attendanceData[cat].male.length; m++) {
                    if (!attendanceData[cat].male[m].region || attendanceData[cat].male[m].region === "") {
                        errorMsg = `[ ${cat} 부문 ] 남학생 ${m+1}번 친구의 지역구를 아직 선택하지 않았어! 📍`;
                        allValid = false;
                        setTimeout((c, gender, index) => {
                            const selectEl = document.getElementById(`select-${c}-${gender}-${index}`);
                            if(selectEl) selectEl.classList.add('need-select');
                        }, 50, cat, 'male', m);
                        break;
                    }
                }
                if (!allValid) break;

                for (let f = 0; f < attendanceData[cat].female.length; f++) {
                    if (!attendanceData[cat].female[f].region || attendanceData[cat].female[f].region === "") {
                        errorMsg = `[ ${cat} 부문 ] 여학생 ${f+1}번 친구의 지역구를 아직 선택하지 않았어! 📍`;
                        allValid = false;
                        setTimeout((c, gender, index) => {
                            const selectEl = document.getElementById(`select-${c}-${gender}-${index}`);
                            if(selectEl) selectEl.classList.add('need-select');
                        }, 50, cat, 'female', f);
                        break;
                    }
                }
                if (!allValid) break;
            }

            if (!allValid) {
                alert(errorMsg);
                return false;
            }
            return true;
        }

        function moveStep(direction) {
            if (direction === 1) {
                if (currentStep === 1) {
                    const name = document.getElementById('leaderName').value.trim();
                    if (!name) { alert('대표자 이름을 꼭 입력해줘! 😊'); return; }
                }
                if (currentStep === 2) {
                    if (calculateTotals() === 0) { alert('같이 온 인원을 최소 1명 이상 입력해줘야 해! 👥'); return; }
                    if (!checkAllRegionsSelected()) return;
                }
            }

            currentStep += direction;
            document.querySelectorAll('.step-page').forEach(page => page.classList.remove('active'));
            document.getElementById(`step${currentStep}`).classList.add('active');

            document.querySelectorAll('.dot').forEach((dot, idx) => {
                dot.classList.remove('active', 'completed');
                if (idx + 1 === currentStep) dot.classList.add('active');
                else if (idx + 1 < currentStep) dot.classList.add('completed');
            });

            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (currentStep === 1) prevBtn.style.visibility = 'hidden';
            else prevBtn.style.visibility = 'visible';

            if (currentStep === 3) {
                document.getElementById('finalLeader').textContent = document.getElementById('leaderName').value;
                document.getElementById('finalTotal').textContent = totalCheckedPeople + " 명";

                let summaryHtml = "";
                ageCategories.forEach(cat => {
                    let localLines = "";
                    attendanceData[cat].male.forEach((p, i) => {
                        localLines += `  - 남 ${i+1}번 친구 👦🏻 ➡️ [${p.region}]<br>`;
                    });
                    attendanceData[cat].female.forEach((p, i) => {
                        localLines += `  - 여 ${i+1}번 친구 👧🏻 ➡️ [${p.region}]<br>`;
                    });
                    if(localLines) {
                        summaryHtml += `<strong style="color:var(--kitsch-orange);">• ${cat} 부문</strong><br>${localLines}`;
                    }
                });
                document.getElementById('finalDetailsList').innerHTML = summaryHtml || "입력된 내역 없음";

                nextBtn.className = "nav-btn btn-submit";
                nextBtn.innerHTML = `최종 제출하기`;
                nextBtn.onclick = saveAndResetPerfect;
            } else {
                nextBtn.className = "nav-btn btn-next";
                nextBtn.innerHTML = `다음 단계로`;
                nextBtn.onclick = function() { moveStep(1); };
            }
        }

        function saveAndResetPerfect() {
            const now = new Date();
            const timestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            const record = {
                date: timestamp,
                leader: document.getElementById('leaderName').value.trim(),
                total: totalCheckedPeople,
                raw_payload: JSON.stringify(attendanceData) 
            };

            let localHistory = JSON.parse(localStorage.getItem('nolter_perfect_final_v5')) || [];
            localHistory.push(record);
            localStorage.setItem('nolter_perfect_final_v5', JSON.stringify(localHistory));

            alert("🎉 완벽 매칭 출석부가 안전하게 저장되었습니다!");
            location.reload();
        }

        function checkAdminPassword(actionType) {
            const userInput = prompt("🔒 관리자 비밀번호를 입력해주세요:");
            if (userInput === null) return; 
            
            if (userInput === ADMIN_PASSWORD) {
                if (actionType === 'download') downloadExcel();
                else if (actionType === 'clear') clearAdminData();
                else if (actionType === 'copy') openTextModal();
            } else {
                alert("❌ 비밀번호가 틀렸습니다! 접근할 수 없습니다.");
            }
        }

        function buildCsvString() {
            const raw = localStorage.getItem('nolter_perfect_final_v5');
            if(!raw) return "";
            const history = JSON.parse(raw);
            if(history.length === 0) return "";

            let csv = "등록일시,대표자,총원";
            ageCategories.forEach(cat => {
                regionOptions.forEach(reg => {
                    csv += `,${cat}_남_${reg},${cat}_여_${reg}`;
                });
            });
            csv += "\n";

            history.forEach(r => {
                csv += `"${r.date} ","${r.leader}",${r.total}`;
                const payload = JSON.parse(r.raw_payload);
                
                ageCategories.forEach(cat => {
                    regionOptions.forEach(reg => {
                        let mCount = payload[cat].male.filter(p => p.region === reg).length;
                        let fCount = payload[cat].female.filter(p => p.region === reg).length;
                        csv += `,${mCount},${fCount}`;
                    });
                });
                csv += "\n";
            });
            return csv;
        }

        function openTextModal() {
            const csvText = buildCsvString();
            if(!csvText) { alert("아직 누적된 출석 데이터가 없어!"); return; }
            document.getElementById('modalTextarea').value = csvText;
            document.getElementById('textDataModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('textDataModal').style.display = 'none'; }

        function copyModalText() {
            const textarea = document.getElementById('modalTextarea');
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            try {
                document.execCommand('copy');
                alert("📋 데이터 복사 완료! 카톡방에 붙여넣기 하세요.");
            } catch (err) {
                alert("복사 실패! 직접 드래그 복사해주세요.");
            }
        }

        function downloadExcel() {
            const csvContent = "\uFEFF" + buildCsvString();
            if(buildCsvString() === "") { alert("아직 누적된 출석 데이터가 없어!"); return; }

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", "놀터_정밀출석데이터_최종.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearAdminData() {
            if(confirm("정말로 누적된 데이터를 전부 지울 거야? 복구할 수 없어!")) {
                localStorage.removeItem('nolter_perfect_final_v5');
                alert("초기화 완료!");
                location.reload();
            }
        }
    </script>
</body>
